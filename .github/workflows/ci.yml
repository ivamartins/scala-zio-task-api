name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Cache sbt
        uses: actions/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v6

      - name: Run tests
        run: sbt ++test
